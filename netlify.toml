[build]
  publish = "."

[functions]
  directory = "functions"
  node_bundler = "esbuild"

# ---------------------------------------------------------------------------
# Form notification emails
# NOTE: Registration, volunteer, and sponsor inquiry forms use Netlify Forms notifications.
# Apparel orders are submitted to Supabase through /.netlify/functions/submit-apparel.
# After deploying, go to Netlify Dashboard → Site settings → Forms →
# Form notifications → Add notification → Email notification
# and add coach@stingersmtb.com for each Netlify-managed form.
# ---------------------------------------------------------------------------

# Redirect all form submissions to the same page (no separate success page needed)
[[redirects]]
  from = "/?submitted=true"
  to = "/"
  status = 200
