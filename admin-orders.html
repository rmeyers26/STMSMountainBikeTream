<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Admin apparel order report for STMS Mountain Bike Team." />
  <meta name="theme-color" content="#1B3D2F" />
  <title>Admin Orders Report - STMS Mountain Bike Team</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    @media print {
      .navbar, .admin-report-header button, #admin-orders-status { display: none !important; }
      body { background: #fff !important; }
      .admin-page .container { padding: 0 !important; }
      .admin-table-wrap { box-shadow: none !important; border: none !important; }
      .admin-report-table th, .admin-report-table td { font-size: 8pt !important; padding: 3pt 4pt !important; }
      .admin-subtotal-row td { background: #eee !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="nav-brand">
      <span class="nav-brand-icon" aria-hidden="true">🚵</span>
      <div class="nav-brand-text">
        Sonoran Trails Middle School (STMS) Mountain Bike Team
        <span>Apparel Order Report</span>
      </div>
    </div>
    <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="nav-menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-menu" id="nav-menu" role="list">
      <li><a href="index.html"><span class="nav-icon" aria-hidden="true">🏠</span>Home</a></li>
      <li><a href="admin-orders.html" class="active"><span class="nav-icon" aria-hidden="true">📊</span>Apparel Orders</a></li>
    </ul>
  </nav>

  <main class="page-content admin-page">
    <section class="section">
      <div class="container">
        <div class="admin-report-header">
          <div>
            <h1 class="section-title" style="margin-bottom:0.35rem;">Apparel Orders</h1>
            <p class="section-subtitle" style="margin-bottom:0;">Latest apparel submissions stored in Supabase.</p>
          </div>
          <div style="display:flex;gap:0.75rem;flex-wrap:wrap;">
            <button type="button" id="admin-print-btn" class="btn btn-primary">🖨️ Print Report</button>
            <button type="button" id="admin-logout-btn" class="btn btn-outline-dark">Log Out</button>
          </div>
        </div>

        <p id="admin-orders-status" class="admin-alert admin-alert-info">Loading orders…</p>

        <div id="admin-orders-empty" class="card" style="display:none;">
          <div class="card-body">
            <p style="margin:0;color:var(--text-medium);">No apparel orders have been submitted yet.</p>
          </div>
        </div>

        <div id="admin-orders-list" class="admin-orders-list" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <script src="js/main.js"></script>
  <script>
    (function () {
      var storageKey = 'stmsAdminSession';
      var autoLogoutTimer = null;
      var statusEl = document.getElementById('admin-orders-status');
      var listEl = document.getElementById('admin-orders-list');
      var emptyEl = document.getElementById('admin-orders-empty');
      var logoutBtn = document.getElementById('admin-logout-btn');

      function formatDate(value) {
        if (!value) return 'Unknown date';
        var date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return date.toLocaleString();
      }

      function setStatus(message, isError) {
        if (!message) {
          statusEl.style.display = 'none';
          statusEl.textContent = '';
          return;
        }

        statusEl.style.display = 'block';
        statusEl.textContent = message;
        statusEl.className = isError ? 'admin-alert admin-alert-error' : 'admin-alert admin-alert-info';
      }

      function getSession() {
        var raw = sessionStorage.getItem(storageKey);
        if (!raw) return null;

        try {
          var session = JSON.parse(raw);
          if (!session.token || !session.expiresAt || Date.now() >= session.expiresAt) {
            return null;
          }
          return session;
        } catch (error) {
          return null;
        }
      }

      function forceLogin() {
        if (autoLogoutTimer) {
          clearTimeout(autoLogoutTimer);
          autoLogoutTimer = null;
        }
        sessionStorage.removeItem(storageKey);
        window.location.replace('admin-login.html');
      }

      function scheduleAutoLogout(session) {
        if (!session || !session.expiresAt) return;

        var remainingMs = session.expiresAt - Date.now();
        if (remainingMs <= 0) {
          forceLogin();
          return;
        }

        autoLogoutTimer = window.setTimeout(function () {
          forceLogin();
        }, remainingMs);
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function getFieldValue(fields, key) {
        if (!fields || typeof fields !== 'object') return '';
        return fields[key] == null ? '' : String(fields[key]);
      }

      function getRiderFieldNumbers(fields) {
        if (!fields || typeof fields !== 'object') return [];

        var riderMap = {};
        Object.keys(fields).forEach(function (key) {
          var match = key.match(/^rider-(\d+)-/);
          if (match) {
            riderMap[match[1]] = true;
          }
        });

        return Object.keys(riderMap)
          .map(function (value) { return parseInt(value, 10); })
          .filter(function (value) { return !Number.isNaN(value); })
          .sort(function (left, right) { return left - right; });
      }

      function buildRiderFromFields(fields, riderNumber) {
        var prefix = 'rider-' + riderNumber + '-';
        return {
          riderNumber: riderNumber,
          name: getFieldValue(fields, prefix + 'name'),
          role: getFieldValue(fields, prefix + 'role'),
          team: getFieldValue(fields, prefix + 'team'),
          topQty: getFieldValue(fields, prefix + 'top-qty'),
          topSize: getFieldValue(fields, prefix + 'top-size'),
          bibQty: getFieldValue(fields, prefix + 'bib-qty'),
          bibSize: getFieldValue(fields, prefix + 'bib-size'),
          tshirtQty: getFieldValue(fields, prefix + 'tshirt-qty'),
          tshirtSize: getFieldValue(fields, prefix + 'tshirt-size')
        };
      }

      function getRidersForOrder(order) {
        var payload = order.order_payload || {};
        var fields = payload.fields || {};
        var riders = Array.isArray(payload.riders) ? payload.riders : [];
        var riderNumbers = getRiderFieldNumbers(fields);

        if (riders.length) {
          return riders.map(function (rider, index) {
            var riderNumber = rider && rider.riderNumber ? rider.riderNumber : index + 1;
            var fromFields = buildRiderFromFields(fields, riderNumber);
            return {
              riderNumber: riderNumber,
              name: fromFields.name || rider.name || '',
              role: fromFields.role || rider.role || '',
              team: fromFields.team || rider.team || '',
              topQty: fromFields.topQty || (rider.topQty != null ? String(rider.topQty) : ''),
              topSize: fromFields.topSize || rider.topSize || '',
              bibQty: fromFields.bibQty || (rider.bibQty != null ? String(rider.bibQty) : ''),
              bibSize: fromFields.bibSize || rider.bibSize || '',
              tshirtQty: fromFields.tshirtQty || (rider.tshirtQty != null ? String(rider.tshirtQty) : ''),
              tshirtSize: fromFields.tshirtSize || rider.tshirtSize || ''
            };
          });
        }

        if (riderNumbers.length) {
          return riderNumbers.map(function (riderNumber) {
            return buildRiderFromFields(fields, riderNumber);
          });
        }

        return [buildRiderFromFields(fields, 1)];
      }

      function getDisplayRows(order) {
        var payload = order.order_payload || {};
        var fields = payload.fields || {};
        var contact = payload.contact || {};
        var riders = getRidersForOrder(order);

        return riders.map(function (rider) {
          return {
            submittedAt: formatDate(order.created_at),
            firstName: getFieldValue(fields, 'first-name') || contact.firstName || '',
            lastName: getFieldValue(fields, 'last-name') || contact.lastName || '',
            email: getFieldValue(fields, 'email') || order.contact_email || contact.email || '',
            phone: getFieldValue(fields, 'phone') || contact.phone || '',
            riderNumber: rider.riderNumber || '',
            riderName: rider.name || '',
            riderRole: rider.role || '',
            riderTeam: rider.team || '',
            topQty: rider.topQty || '',
            topSize: rider.topSize || '',
            bibQty: rider.bibQty || '',
            bibSize: rider.bibSize || '',
            tshirtQty: rider.tshirtQty || '',
            tshirtSize: rider.tshirtSize || ''
          };
        });
      }

      function renderOrders(orders) {
        if (!orders.length) {
          emptyEl.style.display = 'block';
          listEl.innerHTML = '';
          return;
        }

        emptyEl.style.display = 'none';
        var rows = orders.flatMap(function (order) {
          return getDisplayRows(order);
        });

        var totalTopQty = rows.reduce(function (sum, r) { return sum + (parseInt(r.topQty, 10) || 0); }, 0);
        var totalBibQty = rows.reduce(function (sum, r) { return sum + (parseInt(r.bibQty, 10) || 0); }, 0);
        var totalTeeQty = rows.reduce(function (sum, r) { return sum + (parseInt(r.tshirtQty, 10) || 0); }, 0);

        listEl.innerHTML = '<div class="admin-table-wrap">' +
          '<table class="admin-report-table">' +
            '<colgroup>' +
              '<col style="width:8%"/>' +
              '<col style="width:6%"/>' +
              '<col style="width:6%"/>' +
              '<col style="width:13%"/>' +
              '<col style="width:7%"/>' +
              '<col style="width:4%"/>' +
              '<col style="width:8%"/>' +
              '<col style="width:6%"/>' +
              '<col style="width:7%"/>' +
              '<col style="width:5%"/>' +
              '<col style="width:5%"/>' +
              '<col style="width:5%"/>' +
              '<col style="width:5%"/>' +
              '<col style="width:5%"/>' +
              '<col style="width:5%"/>' +
            '</colgroup>' +
            '<thead>' +
              '<tr>' +
                '<th>Submitted</th>' +
                '<th>First Name</th>' +
                '<th>Last Name</th>' +
                '<th>Email</th>' +
                '<th>Phone</th>' +
                '<th>#</th>' +
                '<th>Rider Name</th>' +
                '<th>Role</th>' +
                '<th>Team</th>' +
                '<th>Top Qty</th>' +
                '<th>Top Size</th>' +
                '<th>Bib Qty</th>' +
                '<th>Bib Size</th>' +
                '<th>Tee Qty</th>' +
                '<th>Tee Size</th>' +
              '</tr>' +
            '</thead>' +
            '<tbody>' +
              rows.map(function (row) {
                return '<tr>' +
                  '<td>' + escapeHtml(row.submittedAt) + '</td>' +
                  '<td>' + escapeHtml(row.firstName) + '</td>' +
                  '<td>' + escapeHtml(row.lastName) + '</td>' +
                  '<td>' + escapeHtml(row.email) + '</td>' +
                  '<td>' + escapeHtml(row.phone) + '</td>' +
                  '<td>' + escapeHtml(row.riderNumber) + '</td>' +
                  '<td>' + escapeHtml(row.riderName) + '</td>' +
                  '<td>' + escapeHtml(row.riderRole) + '</td>' +
                  '<td>' + escapeHtml(row.riderTeam) + '</td>' +
                  '<td>' + escapeHtml(row.topQty) + '</td>' +
                  '<td>' + escapeHtml(row.topSize) + '</td>' +
                  '<td>' + escapeHtml(row.bibQty) + '</td>' +
                  '<td>' + escapeHtml(row.bibSize) + '</td>' +
                  '<td>' + escapeHtml(row.tshirtQty) + '</td>' +
                  '<td>' + escapeHtml(row.tshirtSize) + '</td>' +
                '</tr>';
              }).join('') +
            '</tbody>' +
            '<tfoot>' +
              '<tr class="admin-subtotal-row">' +
                '<td colspan="9" style="text-align:right;font-weight:600;">Subtotals:</td>' +
                '<td><strong>' + totalTopQty + '</strong></td>' +
                '<td></td>' +
                '<td><strong>' + totalBibQty + '</strong></td>' +
                '<td></td>' +
                '<td><strong>' + totalTeeQty + '</strong></td>' +
                '<td></td>' +
              '</tr>' +
            '</tfoot>' +
          '</table>' +
        '</div>';
      }

      logoutBtn.addEventListener('click', function () {
        forceLogin();
      });

      document.getElementById('admin-print-btn').addEventListener('click', function () {
        window.print();
      });

      var session = getSession();
      if (!session) {
        forceLogin();
        return;
      }

      scheduleAutoLogout(session);

      fetch('/.netlify/functions/admin-orders', {
        headers: {
          'Authorization': 'Bearer ' + session.token
        }
      })
        .then(function (response) {
          return response.json().catch(function () {
            return { ok: false, error: 'Unexpected response from server.' };
          }).then(function (data) {
            if (response.status === 401) {
              forceLogin();
              throw new Error('Your admin session expired. Please sign in again.');
            }
            if (!response.ok || !data.ok) {
              throw new Error(data.error || 'Unable to load orders right now.');
            }
            return data;
          });
        })
        .then(function (data) {
          setStatus('', false);
          renderOrders(data.orders || []);
        })
        .catch(function (error) {
          setStatus(error.message || 'Unable to load orders right now.', true);
        });
    })();
  </script>
</body>
</html>
